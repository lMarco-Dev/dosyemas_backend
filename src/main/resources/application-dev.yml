spring:
  datasource:
    #Nos conectamos a la BD
    url: jdbc:mysql://127.0.0.1:3306/almacen_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

#Configuración JWT para desarrollo
jwt:
  secret: dosyemas_dev_secret_key_must_be_at_least_32_chars_long!
  expiration: 86400000

#URL de front
app:
  frontend-url: http://localhost:5173

#Logging limpio
logging:
  level:
    root: WARN
    org.springframework.boot: INFO
    com.dosyemas: INFO
    com.zaxxer.hikari: ERROR
    org.hibernate: WARN
    org.apache.catalina: WARN